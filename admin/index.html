<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>MSP Admin Dashboard</title>
  <style>
    body { font-family: Arial, sans-serif; background:#0b1220; color:#e6e8eb; margin:0; padding: 24px; }
    h1 { margin-top:0; }
    table { width:100%; border-collapse: collapse; }
    th, td { text-align:left; padding:10px 8px; border-bottom:1px solid #1f2c3b; }
    th { color:#8aa3bf; }
    .muted { color:#8aa3bf; }
  </style>
</head>
<body>
  <h1>MSP Admin Dashboard</h1>
  <p class="muted">Private admin view: recent staff login activity across tracked services.</p>
  <table>
    <thead>
      <tr><th>Time</th><th>Staff</th><th>Service</th><th>Event</th><th>Source IP</th></tr>
    </thead>
    <tbody id="rows">
      <tr><td colspan="5" class="muted">Loading...</td></tr>
    </tbody>
  </table>
  <script>
    const API_URL = window.API_URL || "http://localhost:42000";
    async function load() {
      const api = API_URL + "/admin/events?limit=100";
      const res = await fetch(api);
      const data = await res.json();
      const tbody = document.getElementById("rows");
      tbody.innerHTML = "";
      for (const row of data) {
        const tr = document.createElement("tr");
        const td1 = document.createElement("td"); td1.textContent = row.created_at||"";
        const td2 = document.createElement("td"); td2.textContent = row.staff_id||"-";
        const td3 = document.createElement("td"); td3.textContent = row.service||"";
        const td4 = document.createElement("td"); td4.textContent = row.event_type||"";
        const td5 = document.createElement("td"); td5.textContent = row.source_ip||"-";
        tr.appendChild(td1); tr.appendChild(td2); tr.appendChild(td3); tr.appendChild(td4); tr.appendChild(td5);
        tbody.appendChild(tr);
      }
      if (!data.length) {
        const tr = document.createElement("tr");
        const td = document.createElement("td");
        td.colSpan = 5;
        td.className = "muted";
        td.textContent = "No events yet";
        tr.appendChild(td);
        tbody.appendChild(tr);
      }
    }
    load();
  </script>
</body>
</html>
