services:
  dashboard:
    image: nginxdemos/hello:latest
    container_name: msp-dashboard
    ports:
      - "${DASHBOARD_PORT:-3000}:80"
    restart: unless-stopped

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: msp-api
    ports:
      - "${API_PORT:-42000}:42000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SECRET_KEY: ${SECRET_KEY:-change-me}
    volumes:
      - ./api:/app
    restart: unless-stopped
    depends_on:
      timescaledb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:42000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: msp-timescaledb
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-msp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      POSTGRES_DB: ${POSTGRES_DB:-msp}
    expose:
      - "5432"
    volumes:
      - tsdb:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U msp"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  tsdb:
